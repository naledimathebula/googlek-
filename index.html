<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genius keep— Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="./assets/google.png">   
</head>
<body>

  <!-- ===== Top App Bar ===== -->
  <header class="app-bar">
    <button class="icon-btn" id="menuToggle" data-tooltip="Menu" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

    <div class="brand">
      <img src="./assets/logo_keep_2026_color_1x_web_48dp.png" alt="Genius Keep logo" class="brand-logo" />
      <span>Genius Keep</span>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24" class="search-icon"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="search" id="searchInput" placeholder="Search your notes" aria-label="Search notes" />
    </div>
    <button class="icon-btn" id="profileBtn" data-tooltip="Profile" aria-label="Profile">
      <img src="./assets/first.svg" alt="Profile" />
    </button>

    <button class="icon-btn" id="themeToggle" data-tooltip="Theme" aria-label="Toggle theme">
      <img src="./assets/second.svg" alt="Theme" /> 
    </button>

    <button class="icon-btn" id="sortToggle" data-tooltip="Settings" aria-label="Sort notes">
        <img src="./assets/settings.svg" alt="Settings" />
    </button>

    <button class="icon-btn" id="gridToggle" data-tooltip="View: grid" aria-label="Toggle layout">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="3" y="14" width="7" height="7" rx="1.5" fill="currentColor"/><rect x="14" y="14" width="7" height="7" rx="1.5" fill="currentColor"/></svg>
    </button>
    
  </header>

  <div class="app-body">

    <!-- ===== Sidebar ===== -->
    <nav class="sidebar" id="sidebar" aria-label="Primary">
      <button class="nav-item is-active" data-view="notes" data-tooltip="Your notes">
        <svg viewBox="0 0 24 24"><path d="M4 4h12l4 4v12H4z" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linejoin="round"/><path d="M16 4v4h4" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>
        <span>Notes</span>
      </button>
      <button class="nav-item" data-view="archive" data-tooltip="Notes you've archived">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M10 13h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span>Archive</span>
      </button>
      <button class="nav-item" data-view="trash" data-tooltip="Deleted notes">
        <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Trash</span>
      </button>
      <button class="nav-item" data-view="settings" data-tooltip="Settings">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 .94l-.38.65a2 2 0 1 1-3.46-2l.38-.65a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 9.6 9l-.38-.65a2 2 0 1 1 .38-2.46l.38.65a1.65 1.65 0 0 0 .94.94h.01a1.65 1.65 0 0 0 .82-.09l.66-.26a2 2 0 1 1 .93-3.76l-.66.26a1.65 1.65 0 0 0-1 .94h-.01a1.65 1.65 0 0 0 .09-.82l-.26-.66a2-2-2-2-2-2Z" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>
        <span>Reminders</span>
      </button>
      <button class="nav-item" data-view="settings" data-tooltip="Settings">
        <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 .94l-.38.65a2 2 0 1 1-3.46-2l.38-.65a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 9.6 9l-.38-.65a2-2-2-2-2-2Z" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>
        <span>Edit</span>
    </nav>

    <!-- ===== Main content ===== -->
    <main class="content">

      <!-- Composer: click to expand into a full note form -->
      <section class="composer-wrap">
        <form id="composerForm" class="composer" data-expanded="false">
          <input type="text" id="composerTitle" class="composer-title" placeholder="Title" />
          <textarea id="composerBody" class="composer-body" placeholder="Take a note…" rows="1"></textarea>

          <div class="composer-actions">
            <div class="composer-tools">
              <button type="button" class="icon-btn small" id="composerPin" data-tooltip="Pin note" aria-pressed="false">
                <svg viewBox="0 0 24 24"><path d="M12 2 9 9l-6 1.5L8 15l-1 7 5-4 5 4-1-7 5-4.5L15 9z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
              </button>
              <div class="color-swatches" id="composerColors"></div>
            </div>
            <div class="composer-buttons">
              <button type="button" class="text-btn" id="composerClose">Close</button>
              <button type="submit" class="text-btn primary">Add</button>
            </div>
          </div>
        </form>
      </section>

      <p class="view-label" id="viewLabel">Your notes will appear here</p>

      <!-- Notes grid -->
      <section class="notes-grid" id="notesGrid" aria-live="polite"></section>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" hidden>
        <svg viewBox="0 0 120 120" width="96" height="96"><path d="M30 20h50l20 20v60a4 4 0 0 1-4 4H30a4 4 0 0 1-4-4V24a4 4 0 0 1 4-4Z" fill="none" stroke="currentColor" stroke-width="3" opacity=".35"/><path d="M40 50h30M40 65h40M40 80h24" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity=".35"/></svg>
        <p id="emptyStateText">Notes you add appear here</p>
      </div>
    </main>
  </div>

  <!-- ===== Edit Modal ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitleLabel">
      <input type="text" id="modalTitle" class="modal-title" placeholder="Title" />
      <textarea id="modalBody" class="modal-body" placeholder="Take a note…"></textarea>

      <div class="modal-footer">
        <div class="composer-tools">
          <button type="button" class="icon-btn small" id="modalPin" data-tooltip="Pin note" aria-pressed="false">
            <svg viewBox="0 0 24 24"><path d="M12 2 9 9l-6 1.5L8 15l-1 7 5-4 5 4-1-7 5-4.5L15 9z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
          </button>
          <button type="button" class="icon-btn small" id="modalArchive" data-tooltip="Archive">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>
          </button>
          <button type="button" class="icon-btn small" id="modalDelete" data-tooltip="Delete">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="color-swatches" id="modalColors"></div>
        </div>
        <button type="button" class="text-btn primary" id="modalDone">Done</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="script.js"></script>
</body>
</html>
